server {
    listen 80;
    server_name canvas.io.vn;

    client_max_body_size 64m;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://__UPSTREAM_HOST__:__UPSTREAM_PORT__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto http;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 80;
        proxy_set_header X-Forwarded-Server $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Canvas sets SameSite=None on session cookies. Chrome 80+ blocks
        # SameSite=None without Secure over HTTP → "Cookies Required" page.
        # Rewrite: strip SameSite=None, strip Secure, add SameSite=Lax.
        proxy_cookie_flags * nosecure samesite=lax;
    }
}
