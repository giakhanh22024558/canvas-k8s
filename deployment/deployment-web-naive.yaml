apiVersion: apps/v1
kind: Deployment
metadata:
  name: canvas-web
  namespace: canvas
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0        # Never start a new pod before terminating an old one —
      maxUnavailable: 1  # prevents memory surge on single-node cluster.
  selector:
    matchLabels:
      app: canvas-web
  template:
    metadata:
      labels:
        app: canvas-web
    spec:
      containers:
        - name: web
          image: khanhdev13/canvas-lms:latest
          envFrom:
            - secretRef:
                name: canvas-secret
          env:
            - name: RAILS_ENV
              value: production
            - name: RAILS_SERVE_STATIC_FILES
              value: "1"
            - name: PASSENGER_START_TIMEOUT
              value: "300"
            - name: PASSENGER_MIN_INSTANCES
              value: "1"
          resources:
            # Stage 4 — naive (pre-VPA) resources from Stage 1 baseline.
            # Memory limit 3Gi is intentionally undersized to reproduce the
            # OOMKill behaviour seen in Stage 1 even with HPA enabled, proving
            # that autoscaling alone cannot save you from wrong resource sizing.
            requests:
              cpu: 800m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
          ports:
            - containerPort: 80
          volumeMounts:
            - name: canvas-config
              mountPath: /usr/src/app/config/database.yml
              subPath: database.yml
            - name: canvas-config
              mountPath: /usr/src/app/config/redis.yml
              subPath: redis.yml
            - name: canvas-config
              mountPath: /usr/src/app/config/domain.yml
              subPath: domain.yml
            - name: canvas-config
              mountPath: /usr/src/app/config/session_store.yml
              subPath: session_store.yml
            - name: canvas-config
              mountPath: /usr/src/app/config/delayed_jobs.yml
              subPath: delayed_jobs.yml
            - name: canvas-config
              mountPath: /usr/src/app/config/outgoing_mail.yml
              subPath: outgoing_mail.yml
            - name: canvas-config
              mountPath: /usr/src/app/config/file_store.yml
              subPath: file_store.yml
            - name: canvas-security
              mountPath: /usr/src/app/config/security.yml
              subPath: security.yml
            - name: canvas-storage
              mountPath: /usr/src/app/tmp/files
      volumes:
        - name: canvas-config
          configMap:
            name: canvas-config
        - name: canvas-security
          secret:
            secretName: canvas-secret
            items:
              - key: security.yml
                path: security.yml
        - name: canvas-storage
          persistentVolumeClaim:
            claimName: canvas-storage
