apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: canvas-web
  namespace: canvas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: canvas-web
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: canvas-jobs
  namespace: canvas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: canvas-jobs
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
