apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: canvas-web
  namespace: canvas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: canvas-web
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      # 300 s = the long-stress hold duration per VU level.
      # HPA must see CPU below threshold for the ENTIRE window before scaling in.
      # This prevents premature scale-in during the 5-minute hold phases:
      # the window expires just as the next VU ramp begins, so CPU rises again
      # before any scale-in can fire.
      stabilizationWindowSeconds: 300
      policies:
        # Remove at most 1 pod per 2 minutes even after the window expires.
        # This extra guard prevents a rapid cascade collapse if CPU dips briefly.
      - type: Pods
        value: 1
        periodSeconds: 120
    scaleUp:
      # React to load increases immediately (no stabilization delay on scale-out).
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: canvas-jobs
  namespace: canvas
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: canvas-jobs
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 120
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
