apiVersion: apps/v1
kind: Deployment
metadata:
  name: canvas-web
  namespace: canvas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: canvas-web
  template:
    metadata:
      labels:
        app: canvas-web
    spec:
      containers:
        - name: web
          image: khanhdev13/canvas-lms:latest
          envFrom:
            - secretRef:
                name: canvas-secret
          env:
            - name: RAILS_ENV
              value: production
            - name: RAILS_SERVE_STATIC_FILES
              value: "1"
            - name: PASSENGER_START_TIMEOUT
              value: "300"
            - name: PASSENGER_MIN_INSTANCES
              value: "1"
          resources:
            requests:
              cpu: 1200m      # Capped at 1200m (VPA target 2281m observed on single pod under full load;
                              # reduced so 5 replicas fit on single 8-vCPU node: 5×1200m=6 CPU)
              memory: 4300Mi  # VPA target: 4506574562 bytes = 4.2Gi → rounded up to 4300Mi
            limits:
              cpu: "4"        # VPA upper bound
              memory: 8Gi     # VPA upper bound
          ports:
            - containerPort: 80
          volumeMounts:
            - name: canvas-config
              mountPath: /usr/src/app/config/database.yml
              subPath: database.yml
            - name: canvas-config
              mountPath: /usr/src/app/config/redis.yml
              subPath: redis.yml
            - name: canvas-config
              mountPath: /usr/src/app/config/domain.yml
              subPath: domain.yml
            - name: canvas-config
              mountPath: /usr/src/app/config/session_store.yml
              subPath: session_store.yml
            - name: canvas-config
              mountPath: /usr/src/app/config/delayed_jobs.yml
              subPath: delayed_jobs.yml
            - name: canvas-config
              mountPath: /usr/src/app/config/outgoing_mail.yml
              subPath: outgoing_mail.yml
            - name: canvas-config
              mountPath: /usr/src/app/config/file_store.yml
              subPath: file_store.yml
            - name: canvas-security
              mountPath: /usr/src/app/config/security.yml
              subPath: security.yml
            - name: canvas-storage
              mountPath: /usr/src/app/tmp/files
      volumes:
        - name: canvas-config
          configMap:
            name: canvas-config
        - name: canvas-security
          secret:
            secretName: canvas-secret
            items:
              - key: security.yml
                path: security.yml
        - name: canvas-storage
          persistentVolumeClaim:
            claimName: canvas-storage
