apiVersion: batch/v1
kind: Job
metadata:
  name: canvas-db-init
  namespace: canvas
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init
          image: khanhdev13/canvas-lms:latest
          envFrom:
            - secretRef:
                name: canvas-secret
          env:
            - name: RAILS_ENV
              value: production
          command:
            - sh
            - -c
            - |
              bundle exec rails db:migrate &&
              bundle exec rake db:initial_setup