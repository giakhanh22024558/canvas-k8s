apiVersion: batch/v1
kind: Job
metadata:
  name: canvas-db-init
  namespace: canvas
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: init
          image: khanhdev13/canvas-lms:latest

          envFrom:
            - secretRef:
                name: canvas-secret

          env:
            - name: RAILS_ENV
              value: production

          command:
            - sh
            - -c
            - |
              echo "⏳ Running DB migrate..."
              bundle exec rails db:migrate &&

              echo "⏳ Seeding basic data..."
              bundle exec rails db:seed &&

              echo "⏳ Creating admin user..."
              bundle exec rails runner "
                u = User.create!(
                  name: 'Admin',
                  short_name: 'Admin',
                  sortable_name: 'Admin',
                  workflow_state: 'active'
                );

                p = Pseudonym.create!(
                  user: u,
                  unique_id: 'admin@canvas.com',
                  password: 'Admin123!',
                  password_confirmation: 'Admin123!',
                  workflow_state: 'active'
                );

                a = Account.default;

                AccountUser.create!(
                  user: u,
                  account: a,
                  role: 'admin'
                );

                puts '✅ Admin created'
              "

          volumeMounts:
            - name: canvas-config
              mountPath: /usr/src/app/config/database.yml
              subPath: database.yml

            - name: canvas-config
              mountPath: /usr/src/app/config/redis.yml
              subPath: redis.yml

            - name: canvas-config
              mountPath: /usr/src/app/config/security.yml
              subPath: security.yml

      volumes:
        - name: canvas-config
          configMap:
            name: canvas-config