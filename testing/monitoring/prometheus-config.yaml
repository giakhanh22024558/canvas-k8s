apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: canvas-monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: cadvisor
        static_configs:
          - targets: ["cadvisor.canvas-monitoring.svc.cluster.local:8080"]
