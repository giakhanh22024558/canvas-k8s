apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: canvas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:14
        env:
        - name: POSTGRES_DB
          value: canvas_production
        - name: POSTGRES_USER
          value: canvas
        - name: POSTGRES_PASSWORD
          value: password
        ports:
        - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: canvas
spec:
  selector:
    app: postgres
  ports:
    - port: 5432